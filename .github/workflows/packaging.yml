name: Packaging
on:
  push:
    tags: ["[0-9]+.*", "v[0-9]+.*"]
permissions: {}

jobs:

  debian:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install python3-build
          sudo apt build-dep .

      - name: Build Debian package
        run: |
          python3 -m build --sdist --no-isolation
          mk-origtargz dist/nicotine-plus-*.tar.gz
          debuild -sa -us -uc

      - name: Prepare artifacts
        run: |
          mkdir build/package/
          cp -Lr ../nicotine_* build/package/

      - name: Archive artifacts
        uses: actions/upload-artifact@v5
        with:
          name: debian-package
          path: build/package/

  flatpak:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - arch: x86_64
            platform: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate manifest
        run: flatpak-builder-lint --exceptions manifest build-aux/flatpak/org.nicotine_plus.Nicotine.json

      - name: Validate appstream
        run: flatpak-builder-lint appstream data/org.nicotine_plus.Nicotine.appdata.xml.in

      - name: Build Flatpak package
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: org.nicotine_plus.Nicotine-${{ matrix.arch }}.flatpak
          manifest-path: build-aux/flatpak/org.nicotine_plus.Nicotine.json
          cache-key: flatpak-builder-${{ github.sha }}
          arch: ${{ matrix.arch }}
          upload-artifact: false

      - name: Archive artifacts
        uses: actions/upload-artifact@v5
        with:
          name: flatpak-${{ matrix.arch }}-package
          path: org.nicotine_plus.Nicotine-${{ matrix.arch }}.flatpak

  snap:
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - arch: x86_64
            platform: ubuntu-latest
          - arch: arm64
            platform: ubuntu-24.04-arm
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build Snap package
        uses: snapcore/action-build@v1
        id: build-snap

      - name: Install Snap package
        run: sudo snap install --dangerous ${{ steps.build-snap.outputs.snap }}

      - name: Archive artifacts
        uses: actions/upload-artifact@v5
        with:
          name: snap-${{ matrix.arch }}-package
          path: ${{ steps.build-snap.outputs.snap }}

  windows:
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            platform: windows-latest
          - arch: arm64
            platform: windows-11-arm
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build web UI
        working-directory: daemon-ui
        run: |
          npm ci
          npm run build

      - name: Install build dependencies
        run: pip install fastapi uvicorn python-multipart pywebview pythonnet pyinstaller

      - name: Build desktop app
        run: pyinstaller --noconfirm --clean build-aux/macos/psyche-seek.spec

      - name: Package portable app
        run: Compress-Archive -Path "dist/PsycheSeek/*" -DestinationPath "PsycheSeek-windows-${{ matrix.arch }}.zip"

      - name: Archive portable artifacts
        uses: actions/upload-artifact@v5
        with:
          name: windows-${{ matrix.arch }}-portable
          path: PsycheSeek-windows-*.zip

  macos:
    strategy:
      matrix:
        include:
          - arch: x86_64
            platform: macos-15-intel
          - arch: arm64
            platform: macos-14
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build web UI
        working-directory: daemon-ui
        run: |
          npm ci
          npm run build

      - name: Install build dependencies
        run: pip install fastapi uvicorn python-multipart pywebview pyobjc-framework-WebKit pyinstaller

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

      - name: Build desktop app
        run: pyinstaller --noconfirm --clean build-aux/macos/psyche-seek.spec

      - name: Code sign app
        if: env.CODESIGN_IDENTITY != ''
        env:
          CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          codesign --force --deep --options runtime --timestamp \
            --entitlements build-aux/macos/codesign-entitlements.plist \
            --sign "$CODESIGN_IDENTITY" "dist/PsycheSeek.app"

      - name: Create disk image
        run: |
          mkdir -p build-aux/macos/build stage
          cp -R "dist/PsycheSeek.app" stage/
          ln -s /Applications stage/Applications
          hdiutil create -volname "PsycheSeek" -srcfolder stage -ov -format UDZO \
            "build-aux/macos/build/PsycheSeek-${{ matrix.arch }}.dmg"

      - name: Notarize and staple installer
        if: env.MACOS_NOTARIZATION_APPLE_ID != ''
        env:
          MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
          MACOS_NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
        run: |
          for dmg in build-aux/macos/build/*.dmg; do
            xcrun notarytool submit "$dmg" \
              --apple-id "$MACOS_NOTARIZATION_APPLE_ID" \
              --team-id "$MACOS_NOTARIZATION_TEAM_ID" \
              --password "$MACOS_NOTARIZATION_PASSWORD" \
              --wait
            xcrun stapler staple "$dmg"
          done

      - name: Archive installer artifacts
        uses: actions/upload-artifact@v5
        with:
          name: macos-${{ matrix.arch }}-installer
          path: build-aux/macos/build/*.dmg

  release:
    needs: [debian, flatpak, snap, windows, macos]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${{ github.ref_name }}"
          if ! gh release view "$VER" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$VER" -R "$GITHUB_REPOSITORY" \
              --draft --title "PsycheSeek $VER" \
              --notes "PsycheSeek packaging artifacts for $VER."
          fi
          gh release upload "$VER" -R "$GITHUB_REPOSITORY" --clobber \
            $(find artifacts -type f)
